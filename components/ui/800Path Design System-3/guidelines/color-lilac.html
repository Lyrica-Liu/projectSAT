<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Lilac scale" subtitle="Periwinkle hero ramp, 50→700" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.04); }
  .name { font-family: var(--font-sans); font-size: 11px; font-weight: 600; color: var(--text-strong); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--lilac-50)"></div><span class="name">50</span><span class="hex">#f4f3fe</span></div>
    <div class="sw"><div class="chip" style="background:var(--lilac-100)"></div><span class="name">100</span><span class="hex">#ebe9fd</span></div>
    <div class="sw"><div class="chip" style="background:var(--lilac-200)"></div><span class="name">200</span><span class="hex">#dad6fb</span></div>
    <div class="sw"><div class="chip" style="background:var(--lilac-300)"></div><span class="name">300</span><span class="hex">#c0b8f7</span></div>
    <div class="sw"><div class="chip" style="background:var(--lilac-400)"></div><span class="name">400</span><span class="hex">#a294f0</span></div>
    <div class="sw"><div class="chip" style="background:var(--lilac-500);box-shadow:var(--shadow-brand)"></div><span class="name">500 ◆</span><span class="hex">#8472e8</span></div>
    <div class="sw"><div class="chip" style="background:var(--lilac-600)"></div><span class="name">600</span><span class="hex">#6f5bd8</span></div>
    <div class="sw"><div class="chip" style="background:var(--lilac-700)"></div><span class="name">700</span><span class="hex">#5a47b8</span></div>
  </div>
</body>
</html>
