<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Ink & surfaces" subtitle="Warm-cool grays, never pure black" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  .name { font-family: var(--font-sans); font-size: 11px; font-weight: 600; color: var(--text-strong); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><span class="name">ink-900</span><span class="hex">#1f1d26</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><span class="name">ink-700</span><span class="hex">#353240</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><span class="name">ink-500</span><span class="hex">#57535f</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><span class="name">ink-400</span><span class="hex">#7b7783</span></div>
    <div class="sw"><div class="chip" style="background:var(--line-strong)"></div><span class="name">line</span><span class="hex">#dddbe6</span></div>
    <div class="sw"><div class="chip" style="background:var(--surface-2)"></div><span class="name">sunken</span><span class="hex">#f3f1f9</span></div>
    <div class="sw"><div class="chip" style="background:var(--canvas)"></div><span class="name">canvas</span><span class="hex">#f7f5fc</span></div>
  </div>
</body>
</html>
