<!-- @dsCard group="Spacing" viewport="700x130" name="Spacing scale" subtitle="4px base — 4 → 64" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--lilac-300); border-radius: 4px; width: 22px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:8px"></div><span class="lbl">2</span></div>
    <div class="col"><div class="bar" style="height:12px"></div><span class="lbl">3</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="lbl">4</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="lbl">6</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="lbl">8</span></div>
    <div class="col"><div class="bar" style="height:40px"></div><span class="lbl">10</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span class="lbl">12</span></div>
    <div class="col"><div class="bar" style="height:64px"></div><span class="lbl">16</span></div>
  </div>
</body>
</html>
